[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    arduino-libraries/Arduino_JSON@^0.1.0
    ; Preferences, WiFi, WebServer, HTTPClient, time.h sudah bawaan framework
build_flags = 
    -DCORE_DEBUG_LEVEL=0